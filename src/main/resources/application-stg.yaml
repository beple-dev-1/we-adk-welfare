# 스테이징 환경 (운영 DB 연결)
# 민감 정보는 환경변수로 주입 — 이 파일에 직접 값 작성 금지
spring:
  datasource:
    url: ${STG_DB_URL}
    username: ${STG_DB_USERNAME}
    password: ${STG_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.biplepay.welfareaxbe: WARN
