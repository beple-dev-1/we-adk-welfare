# 개발 서버 환경 (실제 개발 DB, GitLab 연동)
# 민감 정보는 환경변수로 주입 — 이 파일에 직접 값 작성 금지
spring:
  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.biplepay.welfareaxbe: INFO
